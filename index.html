<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluación de nacionalidad alemana · German citizenship check</title>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=cfReady&render=explicit" async defer></script>
<style>
  :root{
    --card:#ffffff; --ink:#1e293b; --muted:#64748b; --line:#e2e8f0;
    --brand:#1d4ed8;
    --green:#15803d; --amber:#b45309; --blue:#1d4ed8; --red:#b91c1c;
    --green-bg:#dcfce7; --amber-bg:#fef3c7; --blue-bg:#dbeafe; --red-bg:#fee2e2;
  }
  *{box-sizing:border-box}
  body{margin:0;background:#f1f5f9;color:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;line-height:1.5}
  .wrap{max-width:720px;margin:0 auto;padding:24px 16px 64px}
  header{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:8px}
  .logo{font-weight:800;font-size:18px;color:var(--brand)}
  .lang{display:flex;gap:4px}
  .lang button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:4px 12px;cursor:pointer;font-size:13px;color:var(--muted)}
  .lang button.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .progress{height:6px;background:var(--line);border-radius:999px;overflow:hidden;margin:16px 0 20px}
  .bar{height:100%;background:var(--brand);width:0;transition:width .3s}
  .step-label{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--brand);margin-bottom:8px}
  h1{font-size:22px;margin:0 0 6px}
  .lead{color:var(--muted);font-size:15px;margin:0 0 20px}
  .q{font-size:19px;font-weight:700;margin:0 0 6px}
  .qhint{color:var(--muted);font-size:13px;margin:0 0 18px}
  .opt{display:block;width:100%;text-align:left;border:1.5px solid var(--line);background:#fff;border-radius:12px;
       padding:14px 16px;margin-bottom:10px;cursor:pointer;font-size:15px;transition:.15s;color:var(--ink)}
  .opt:hover{border-color:var(--brand);background:#f8faff}
  .opt.sel{border-color:var(--brand);background:#eff4ff}
  .opt small{display:block;color:var(--muted);font-size:12.5px;margin-top:3px}
  input,select,textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;font-size:15px;font-family:inherit}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand)}
  textarea{resize:vertical;min-height:96px;line-height:1.45}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:600}
  .row{display:flex;gap:10px}.row .field{flex:1}
  .nav{display:flex;justify-content:space-between;margin-top:22px;gap:12px}
  .btn{border:none;border-radius:12px;padding:13px 22px;font-size:15px;font-weight:600;cursor:pointer}
  .btn-primary{background:var(--brand);color:#fff}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed}
  .btn-ghost{background:#fff;border:1px solid var(--line);color:var(--muted)}
  .disc{font-size:12px;color:var(--muted);background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-top:20px}
  /* árbol */
  .tree{margin:8px 0 4px}
  .node{display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:6px;background:#fff;font-size:14px}
  .node .who{font-weight:700}.node .meta{color:var(--muted);font-size:12.5px}
  .node.de{border-color:var(--green);background:var(--green-bg)}
  .node.brk{border-color:var(--red);background:var(--red-bg)}
  .node.warn{border-color:var(--amber);background:var(--amber-bg)}
  .conn{color:var(--muted);font-size:18px;text-align:center;margin:-2px 0 2px 18px}
  /* árbol rediseñado */
  .tree2{position:relative;margin:12px 0 4px;padding-left:4px}
  .tnode{position:relative;display:flex;gap:12px;align-items:flex-start;padding:11px 14px;border:1.5px solid var(--line);border-radius:14px;background:#fff}
  .tnode .gen{font-size:10.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--brand);min-width:70px;padding-top:3px;line-height:1.3}
  .tnode .body{flex:1;min-width:0}
  .tnode .nm{font-weight:700;font-size:15.5px;line-height:1.25}
  .tnode .mt{color:var(--muted);font-size:13px;margin-top:2px}
  .tnode .pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;margin-top:8px;color:#fff}
  .tnode.de{border-color:var(--green);background:var(--green-bg)} .tnode.de .gen{color:var(--green)}
  .tnode.brk{border-color:var(--red);background:var(--red-bg)} .tnode.brk .gen{color:var(--red)}
  .tnode.warn{border-color:var(--amber);background:var(--amber-bg)} .tnode.warn .gen{color:var(--amber)}
  .tconn{width:2px;height:16px;background:var(--line);margin:0 0 0 36px}
  .tnode.brk + .tconn, .tconn.cut{background:repeating-linear-gradient(var(--red) 0 4px,transparent 4px 8px)}
  /* resultados */
  .res{margin-bottom:14px;border-radius:14px;padding:16px 18px;border:1px solid}
  .res h3{margin:0 0 4px;font-size:16px}.res p{margin:4px 0 0;font-size:14px}
  .badge{display:inline-block;font-size:12px;font-weight:700;padding:2px 10px;border-radius:999px;margin-bottom:8px}
  .g{border-color:var(--green);background:var(--green-bg)} .g .badge{background:var(--green);color:#fff}
  .a{border-color:var(--amber);background:var(--amber-bg)} .a .badge{background:var(--amber);color:#fff}
  .b{border-color:var(--blue);background:var(--blue-bg)} .b .badge{background:var(--blue);color:#fff}
  .r{border-color:var(--red);background:var(--red-bg)} .r .badge{background:var(--red);color:#fff}
  .savednote{font-size:12px;text-align:center;color:var(--muted);margin-top:16px}
  a{color:var(--brand)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">⚖️ <span id="brandName">Nacionalidad Alemana</span></div>
    <div class="lang">
      <button id="es" class="on" onclick="setLang('es')">ES</button>
      <button id="en" onclick="setLang('en')">EN</button>
    </div>
  </header>
  <div class="card">
    <div class="progress"><div class="bar" id="bar"></div></div>
    <div id="app"></div>
  </div>
  <p class="disc" id="discFoot"></p>
</div>

<script>
/* =========================================================================
   CONFIG — credenciales de Supabase (ver README_despliegue.md).
   Vacías = modo demo (guarda en el navegador).
   ========================================================================= */
const CONFIG = {
  // Registros vía /api/lead (servidor, con captcha). Estos dos son el fallback durante la transición.
  SUPABASE_URL:"https://tosqlwepfsotlyzyinyr.supabase.co",
  SUPABASE_ANON_KEY:"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvc3Fsd2VwZnNvdGx5enlpbnlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MDk5MTQsImV4cCI6MjA5NzM4NTkxNH0.-AC4WgESZcc7TWa5Wmi71tWC4eJ-EwzB1Q_YaW5lGAc",
  // Pega aquí tu "Site Key" de Cloudflare Turnstile (es pública). Vacío = sin captcha.
  TURNSTILE_SITEKEY:"0x4AAAAAADnaUBCSdYce1EBp"
};

let LANG="es";
const T=(es,en)=>LANG==="es"?es:en;
const esc=s=>(s==null?"":String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* ---------------- estado ---------------- */
const blank=()=>({
  applicant:{name:"",birthYear:"",country:""},
  chain:[],          // ancestros: {rel:'padre'|'madre', name, birthYear, country, childInWedlock:'si'|'no'|'ns'}
  draft:{},          // ancestro en construcción
  facts:{},          // emigYear, matrikel, natz1914, persecution, natz25, lives
  factsQueue:[], fIdx:0,
  contact:{},
  bothNoted:false,
  sessionId:(typeof crypto!=="undefined"&&crypto.randomUUID)?crypto.randomUUID():"s"+Date.now()+Math.round(Math.random()*1e6),
  partialSaved:false, sessionPass:null,
  screen:"intro"
});
let state=blank();
const hist=[];

const childOf=i=> i===0 ? state.applicant : state.chain[i-1];     // a quién transmite el ancestro i
const currentChild=()=> state.chain.length? state.chain[state.chain.length-1] : state.applicant;
const isGerman=p=> !!(p && ((p.country && p.country.toLowerCase().match(/alemania|germany|deutschland/)) || p.germanCitizen==="si"));
const germanAncestor=()=> [...state.chain].reverse().find(isGerman) || (state.chain.length?state.chain[state.chain.length-1]:null);

/* ---------------- navegación ---------------- */
function snapshot(){ hist.push(JSON.stringify({a:state.applicant,c:state.chain,d:state.draft,f:state.facts,q:state.factsQueue,i:state.fIdx,s:state.screen,ct:state.contact,bn:state.bothNoted})); }
function back(){ if(!hist.length) return; const p=JSON.parse(hist.pop());
  state.applicant=p.a;state.chain=p.c;state.draft=p.d;state.facts=p.f;state.factsQueue=p.q;state.fIdx=p.i;state.screen=p.s;state.contact=p.ct;state.bothNoted=p.bn; render(); }
function go(screen){ snapshot(); state.screen=screen; render(); }

/* ---------------- construir cola de hechos ---------------- */
function buildFactsQueue(){
  const G=germanAncestor(); const q=[];
  if(G){ q.push("f_emig"); }                         // emigración del alemán
  // matrikel/natz1914 se deciden tras conocer el año de emigración (en advance)
  q.push("f_persecution");
  q.push("f_natz25");
  q.push("f_adoption");
  // pérdida por matrimonio (§17): solo se pregunta si en algún eslabón el matrimonio quedó incierto
  if(state.chain.some(function(p){ return p.childInWedlock==="ns" || (p.childInWedlock==="no" && !p.marriageYear); })) q.push("f_marriageloss");
  q.push("f_mil28");
  q.push("f_namechange");
  q.push("f_lives");
  q.push("f_relative");
  q.push("f_notes");
  state.factsQueue=q; state.fIdx=0;
}
function curFact(){ return state.factsQueue[state.fIdx]; }
function nextFact(){
  // inserción condicional tras f_emig
  if(curFact()==="f_emig"){
    const e=state.facts.emigYear;
    if(e==="pre1904"||e==="1904_1913"||e==="ns"){ state.factsQueue.splice(state.fIdx+1,0,"f_matrikel","f_natz1914"); }
  }
  if(curFact()==="f_natz25" && state.facts.natz25==="si_apeticion"){ state.factsQueue.splice(state.fIdx+1,0,"f_natz25_eu"); }
  if(curFact()==="f_natz25_eu" && state.facts.natz25_eu==="no"){ state.factsQueue.splice(state.fIdx+1,0,"f_natz25_year"); }
  if(curFact()==="f_natz25_year" && state.facts.natz25_year==="antes"){ state.factsQueue.splice(state.fIdx+1,0,"f_natz25_permit"); }
  if(curFact()==="f_natz25_permit" && (state.facts.natz25_permit==="no"||state.facts.natz25_permit==="ns")){ state.factsQueue.splice(state.fIdx+1,0,"f_natz25_when"); }
  if(curFact()==="f_adoption" && state.facts.adoption==="si"){ state.factsQueue.splice(state.fIdx+1,0,"f_adoption_age"); }
  state.fIdx++;
  if(state.fIdx>=state.factsQueue.length){ go("result"); } else { go("facts"); }
}

/* =========================================================================
   MOTOR DE RESULTADOS — recorre el árbol con nombres
   ========================================================================= */
function analyze(){
  const A=state, vias=[]; const yr=p=>parseInt(p&&p.birthYear)||null;
  const preNazi=["pre1904","1904_1913","1914_1932"].includes(A.facts.emigYear);   // emigró antes del régimen nazi (1933)
  // ----- VIA A: cadena de descendencia -----
  let breakInfo=null, gaps=[], maritalUnknown=[];
  for(let i=0;i<A.chain.length;i++){
    const parent=A.chain[i], child=childOf(i);
    const cy=yr(child), rel=parent.rel; const my=parseInt(parent.marriageYear);
    let wed=parent.childInWedlock;
    if(wed==="ns" && my && cy){ wed = (my<=cy) ? "si" : "no"; }   // matrimonio antes del nacimiento = matrimonial
    if(!cy){ gaps.push(T(`falta el año de nacimiento de ${child.name||"un familiar"}`,`missing birth year for ${child.name||"a relative"}`)); continue; }
    if(rel==="madre"){
      if(wed==="si" && cy<1975){
        breakInfo={person:child.name, parent:parent.name, year:cy, reason:"genero"}; break;
      } else if(wed==="ns" && cy<1975){ maritalUnknown.push(child.name||T("un familiar","a relative")); }
    } else if(rel==="padre"){
      if(wed==="no" && cy<1993){
        const legit = my && my>=cy && my<=cy+18 && my<1998;   // legitimación por matrimonio posterior (siendo menor, antes de 1998)
        breakInfo={person:child.name, parent:parent.name, year:cy, reason:"paternidad", legitimated:!!legit}; break;
      } else if(wed==="ns" && cy<1993){ maritalUnknown.push(child.name||T("un familiar","a relative")); }
    }
  }
  if(!breakInfo) maritalUnknown.forEach(n=> gaps.push(T(`confirmar si ${n} nació dentro o fuera del matrimonio (define si la línea se transmite)`,`confirm whether ${n} was born in or out of wedlock (it determines whether the line transmits)`)));
  // pérdidas sobre el antepasado alemán
  const G=germanAncestor(); let lossInfo=null;
  if(G){
    // §21 (1871–1914): la pérdida por 10 años solo se consuma si emigró antes de ~1904 (completó 10 años antes de la abolición de 1914)
    if(A.facts.emigYear==="pre1904" && A.facts.matrikel==="no") lossInfo={person:G.name, reason:"matrikel"};
    else if(A.facts.emigYear==="ns" && A.facts.matrikel==="no") lossInfo={person:G.name, reason:"matrikel_posible"};
    else if(["pre1904","1904_1913","ns"].includes(A.facts.emigYear) && A.facts.matrikel==="ns") gaps.push(T(`verificar la inscripción consular (Matrikel) de ${G.name} en el archivo invenio`,`check ${G.name}'s consular registration (Matrikel) in the invenio archive`));
    if(["usa","otro"].includes(A.facts.natz1914)) lossInfo=lossInfo||{person:G.name, reason:"natz1914"};
  }
  // §25: pérdida por naturalización a petición, no-UE, antes de 2024, sin permiso de conservación
  const natzLoss = A.facts.natz25==="noeu_apeticion"   // valor directo (compatibilidad)
    || (A.facts.natz25==="si_apeticion" && A.facts.natz25_eu==="no" && A.facts.natz25_year==="antes" && (A.facts.natz25_permit==="no"||A.facts.natz25_permit==="ns"));
  if(natzLoss){
    if(A.facts.natz25_when==="despues"){ /* el hijo ya era alemán al naturalizarse el padre: sin pérdida */ }
    else if(A.facts.natz25_when==="ns"){ gaps.push(T("determinar la fecha exacta de la naturalización (si fue antes o después del nacimiento del hijo/a, define si hubo pérdida)","determine the exact naturalization date (whether before or after the child's birth determines if citizenship was lost)")); }
    else lossInfo=lossInfo||{person:(A.applicant.name||T("el solicitante","the applicant")), reason:"stag25"};
  }
  if(A.facts.persecution==="si" && !preNazi) lossInfo=lossInfo||{person:(G?G.name:T("tu antepasado","your ancestor")), reason:"deprivation"};
  if(A.facts.marriageloss==="si") lossInfo=lossInfo||{person:T("una mujer de tu línea","a woman in your line"), reason:"marriage"};
  if(!germanAncestorReached()) gaps.push(T("la línea no llega aún a una persona nacida en Alemania","the line doesn't yet reach a person born in Germany"));
  if(G && G.name && !yr(G)) gaps.push(T(`falta o es incierto el año de nacimiento de ${G.name} (tu antepasado alemán)`,`${G.name}'s birth year (your German ancestor) is missing or uncertain`));

  if(A.chain.length){
    let st, msg;
    if(breakInfo && breakInfo.reason==="paternidad" && breakInfo.legitimated){
      st="DUDOSO";
      msg=T(`${breakInfo.person} nació fuera del matrimonio, pero sus padres se casaron después (legitimación). Bajo la ley antigua eso podía conferir la nacionalidad — requiere revisión profesional.`,`${breakInfo.person} was born out of wedlock, but the parents married afterwards (legitimation). Under the old law this could confer citizenship — needs professional review.`);
    } else if(breakInfo){
      st="POCO";
      msg = breakInfo.reason==="genero"
        ? T(`La línea se interrumpe en ${breakInfo.person} (nacido/a en ${breakInfo.year}): heredaba de su madre ${breakInfo.parent}, y antes de 1975 la línea materna no transmitía automáticamente.`,
            `The line breaks at ${breakInfo.person} (born ${breakInfo.year}): inheriting from the mother ${breakInfo.parent}, and before 1975 the maternal line did not transmit automatically.`)
        : T(`La línea se interrumpe en ${breakInfo.person}: nacido/a fuera del matrimonio de padre alemán antes de 1993.`,
            `The line breaks at ${breakInfo.person}: born out of wedlock to a German father before 1993.`);
    } else if(lossInfo){
      st = lossInfo.reason==="matrikel_posible" ? "DUDOSO" : "POCO";
      const r={matrikel:T(`${lossInfo.person} habría perdido la nacionalidad: vivió 10+ años fuera de Alemania antes de 1914 sin inscripción consular.`,`${lossInfo.person} would have lost citizenship: lived 10+ years abroad before 1914 without consular registration.`),
               matrikel_posible:T(`${lossInfo.person} pudo haber perdido la nacionalidad por la regla de los 10 años, pero falta confirmar el año exacto de emigración y la inscripción consular (verificable en invenio).`,`${lossInfo.person} may have lost citizenship under the 10-year rule, but the exact emigration year and consular registration need confirming (checkable in invenio).`),
               natz1914:T(`${lossInfo.person} se naturalizó en el extranjero antes de 1914, lo que causaba la pérdida.`,`${lossInfo.person} naturalized abroad before 1914, which caused loss.`),
               stag25:T(`${lossInfo.person} adquirió otra nacionalidad por solicitud propia, lo que causaba la pérdida de la alemana.`,`${lossInfo.person} acquired another nationality by application, which caused loss of the German one.`),
               deprivation:T(`A ${lossInfo.person} le retiraron la nacionalidad alemana durante el nazismo, por lo que la herencia normal de la nacionalidad está interrumpida. Tu vía correcta es la restitución (más abajo), no la ascendencia ordinaria.`,`${lossInfo.person} was stripped of German citizenship under Nazism, so the ordinary inheritance of citizenship is broken. Your correct route is restitution (below), not ordinary descent.`),
               marriage:T(`La nacionalidad pudo perderse cuando una mujer de tu línea se casó con un extranjero antes de 1953. La herencia normal se interrumpe ahí, pero esta discriminación histórica suele poder revertirse (ver vía de declaración).`,`Citizenship may have been lost when a woman in your line married a foreigner before 1953. The ordinary inheritance breaks there, but this historical discrimination can often be reversed (see declaration route).`)};
      msg=r[lossInfo.reason];
    } else if(gaps.length){ st="INFO"; msg=T("Falta confirmar algunos datos para evaluar la línea.","Some data is missing to assess the line."); }
    else { st="VIABLE"; msg=T(`La línea desde ${G?G.name:"tu antepasado alemán"} hasta ${A.applicant.name||"ti"} parece mantenerse. Habrá que respaldarla con documentos.`,`The line from ${G?G.name:"your German ancestor"} to ${A.applicant.name||"you"} appears intact. It must be backed with documents.`); }
    if(A.facts.adoption==="si"){
      if(A.facts.adoption_age==="adulto"){ st="POCO"; msg=T(`La adopción de una persona adulta no transmite la nacionalidad alemana, por lo que la línea no continúa por esa vía.`,`Adoption of an adult does not transmit German citizenship, so the line does not continue through that route.`); }
      else if(st==="VIABLE"){ st="DUDOSO"; msg=T(`Hay una adopción en la línea hacia ${A.applicant.name||"ti"}. La adopción transmite la nacionalidad solo si fue de un menor por un adoptante alemán (desde 1977), así que necesita revisión profesional.`,`There is an adoption in the line to ${A.applicant.name||"you"}. Adoption transmits citizenship only if it was of a minor by a German adopter (since 1977), so it needs professional review.`); }
    }
    if(A.facts.mil28==="si" && st==="VIABLE"){ st="DUDOSO"; msg=T(`Posible pérdida de la nacionalidad por servicio militar voluntario en un ejército extranjero (§28, desde el año 2000); requiere revisión profesional.`,`Possible loss of citizenship due to voluntary service in a foreign army (§28, since the year 2000); needs professional review.`); }
    let mark=null;
    if(breakInfo) mark={person:breakInfo.person, type:breakInfo.legitimated?"legit":"break"};
    else if(lossInfo) mark={person:lossInfo.person, type:"loss"};
    // Razonamiento jurídico (informe interno para la asesora; siempre en español)
    let legalA;
    if(breakInfo && breakInfo.reason==="genero")
      legalA=`Corte de transmisión por género en ${breakInfo.person} (n. ${breakInfo.year||"?"}): hijo/a matrimonial de madre alemana antes del 1.1.1975 — bajo el RuStAG vigente la línea materna no confería la nacionalidad (transmitía el padre). Vía correctiva: derecho de declaración del §5 StAG (en vigor 20.8.2021, plazo 19.8.2031), extensible a descendientes. Documentos: partida de ${breakInfo.person} y prueba de la nacionalidad alemana de la madre (${breakInfo.parent}).`;
    else if(breakInfo && breakInfo.reason==="paternidad" && breakInfo.legitimated)
      legalA=`Posible legitimación: ${breakInfo.person} (n. ${breakInfo.year||"?"}) nació fuera del matrimonio de padre alemán y los padres se casaron después. Bajo el §5 RuStAG antiguo la legitimación de un menor (antes del 1.7.1998) confería la nacionalidad. Revisar acta de matrimonio y de reconocimiento de paternidad.`;
    else if(breakInfo && breakInfo.reason==="paternidad")
      legalA=`Corte por filiación no matrimonial de padre alemán antes del 1.7.1993 (§4(1) RuStAG: el hijo no matrimonial de padre alemán no adquiría salvo legitimación). ${breakInfo.person} n. ${breakInfo.year||"?"}.${breakInfo.year>=1949?" Por ser ≥1949, procede examinar la declaración del §5 StAG.":""}`;
    else if(lossInfo){
      const lg={
        matrikel:`Pérdida ex §21 de la Ley del 1.6.1870 (vigente 1.1.1871–1.1.1914): ${lossInfo.person} habría residido +10 años en el extranjero sin inscripción consular (Matrikel) ni papeles de origen vigentes → pérdida automática antes de la abolición por el RuStAG de 1913. Verificar Matrikel/Passregister en el Politisches Archiv (invenio, grupo AB 2).`,
        matrikel_posible:`Posible pérdida del §21 (regla de los 10 años): falta confirmar la fecha exacta de emigración y la inscripción consular de ${lossInfo.person}. Verificación en invenio (Politisches Archiv).`,
        natz1914:`Pérdida por naturalización en el extranjero antes de 1914 (RuStAG/Ley 1870; si fue en EE.UU., Tratados Bancroft de 1868: presunción de expatriación a los 5 años).`,
        stag25:`Pérdida por adquisición voluntaria de otra nacionalidad a petición (§25 StAG, aplicable hasta el 26.6.2024; país no-UE; sin Beibehaltungsgenehmigung). Confirmar la fecha respecto al nacimiento del descendiente siguiente (si fue posterior, el descendiente ya había adquirido).`,
        deprivation:`La herencia ordinaria del §4 StAG está interrumpida por la persecución nazi; la vía idónea es la restitución (Art. 116(2) GG / §15 StAG), no la ascendencia común.`,
        marriage:`Pérdida por matrimonio de mujer alemana con extranjero antes del 1.4.1953 (§17 nº6 RuStAG antiguo). Discriminación reversible mediante declaración/renaturalización.`
      };
      legalA=lg[lossInfo.reason]||"";
    }
    else if(gaps.length) legalA=`Faltan antecedentes para acreditar la cadena del §4 StAG: ${gaps.join("; ")}.`;
    else legalA=`Cadena de transmisión del §4 StAG (ius sanguinis) aparentemente ininterrumpida de ${G?G.name:"el antepasado alemán"} a ${A.applicant.name||"el/la solicitante"}. Procede solicitar la Feststellung der deutschen Staatsangehörigkeit ante el BVA. Documentos: Staatsangehörigkeitsausweis o pasaporte alemán del antepasado, partidas de cada eslabón y prueba de no pérdida (§§21/25/17).`;
    if(A.facts.adoption==="si") legalA += A.facts.adoption_age==="adulto" ? " Adopción de adulto: no transmite (el §6 StAG solo confiere por adopción de menores, desde 1977)." : " Adopción en la línea: el §6 StAG confiere por adopción de menor por adoptante alemán (desde 1977); verificar edad y fecha.";
    if(A.facts.mil28==="si") legalA += " Posible pérdida por servicio militar voluntario en fuerzas armadas extranjeras (§28 StAG, desde 2000).";
    if(A.facts.relative==="si") legalA += " Antecedente relevante: un familiar ya obtuvo la nacionalidad por el mismo antepasado — solicitar copia de su Feststellung/Staatsangehörigkeitsausweis como precedente.";
    vias.push({k:"A", name:T("Nacionalidad por ascendencia","Citizenship by descent"), state:st, msg, gaps, mark, legal:legalA});
  }
  // ----- VIA C: declaración §5 (cubre madre alemana 1949–1974 Y padre alemán no matrimonial 1949–1993) -----
  const deprivation = A.facts.persecution==="si" && !preNazi;
  if(breakInfo && (breakInfo.reason==="genero"||breakInfo.reason==="paternidad") && breakInfo.year>=1949 && !deprivation && A.facts.marriageloss!=="si" && !breakInfo.legitimated){
    const msg = breakInfo.reason==="genero"
      ? T(`Como la línea se cortó por venir de una mujer (${breakInfo.parent}), podrías recuperar la nacionalidad por una declaración especial (§5), disponible hasta agosto de 2031.`,
          `Since the line broke because it came through a woman (${breakInfo.parent}), you may reclaim citizenship via a special declaration (§5), available until August 2031.`)
      : T(`Como ${breakInfo.person} nació fuera del matrimonio de un padre alemán (${breakInfo.parent}) antes de 1993, podrías recuperar la nacionalidad por una declaración especial (§5), disponible hasta agosto de 2031.`,
          `Since ${breakInfo.person} was born out of wedlock to a German father (${breakInfo.parent}) before 1993, you may reclaim citizenship via a special declaration (§5), available until August 2031.`);
    vias.push({k:"C", name:T("Declaración por discriminación histórica (§5)","Historical-discrimination declaration (§5)"), state:"VIABLE", msg, gaps:[],
      legal:`Declaración del §5 StAG (en vigor 20.8.2021, plazo hasta 19.8.2031) por discriminación histórica: ${breakInfo.reason==="genero"?"hijo/a matrimonial de madre alemana nacido 1949–1974":"hijo/a no matrimonial de padre alemán nacido 1949–1993"}. Adquisición por simple declaración ante el BVA, sin examen de idioma ni residencia, extensible a descendientes. Excepción excluyente: reconocimiento paterno entre 1.1.1970 y 31.8.1986.`});
  }
  // ----- VIA C2: pérdida de nacionalidad por matrimonio (mujer alemana, antes de 1953) -----
  if(A.facts.marriageloss==="si" && !deprivation){
    vias.push({k:"C", name:T("Restitución por pérdida por matrimonio","Restitution for citizenship lost by marriage"), state:"DUDOSO",
      msg:T("Una mujer de tu línea pudo perder la nacionalidad alemana al casarse con un extranjero antes de 1953. Esta discriminación histórica suele poder revertirse mediante declaración o renaturalización — requiere revisión de un especialista.","A woman in your line may have lost German citizenship by marrying a foreigner before 1953. This historical discrimination can often be reversed via declaration or re-naturalization — needs specialist review."), gaps:[],
      legal:`Pérdida por matrimonio con extranjero antes del 1.4.1953 (§17 nº6 RuStAG antiguo, derogado por la igualdad del Art. 3(2) GG). Discriminación de género reversible: examinar declaración análoga al §5 StAG o renaturalización facilitada (§13 StAG). Requiere acta de matrimonio de la mujer alemana y prueba de su nacionalidad.`});
  }
  // ----- VIA B: restitución nazi (SOLO si hay un "sí" afirmativo; "no sé" no crea vía) -----
  if(A.facts.persecution==="si"){
    let st, msg;
    if(preNazi){
      st="DUDOSO";
      msg=T(`${G?G.name:"Tu antepasado"} emigró antes del régimen nazi (1933), así que la persecución nazi normalmente no sería la vía — salvo que se le privara de la nacionalidad estando ya en el extranjero (p. ej. el decreto de 1941 contra judíos emigrados). Conviene confirmarlo con un especialista.`,
            `${G?G.name:"Your ancestor"} emigrated before the Nazi regime (1933), so Nazi persecution would normally not be the route — unless they were stripped of citizenship while already abroad (e.g. the 1941 decree against emigrated Jews). Best confirmed with a specialist.`);
    } else {
      st="VIABLE";
      msg=T(`Como ${G?G.name:"tu antepasado"} o su familia perdieron la nacionalidad alemana por la persecución nazi, tú y tus descendientes podrían recuperarla por restitución, sin renunciar a tu nacionalidad actual.`,
            `Since ${G?G.name:"your ancestor"} or their family lost German citizenship due to Nazi persecution, you and your descendants may reclaim it via restitution, without giving up your current nationality.`);
    }
    vias.push({k:"B", name:T("Restitución por persecución nazi (Art. 116(2)/§15)","Nazi-persecution restitution (Art. 116(2)/§15)"), state:st, msg, gaps:[],
      legal: preNazi
        ? `Restitución dudosa por la fecha: el antepasado emigró antes del régimen nazi (1933). El Art. 116(2) GG / §15 StAG cubre privaciones 1933–1945; la única hipótesis aplicable a un emigrante previo sería la 11.ª Ordenanza de la Ley de Ciudadanía del Reich (25.11.1941), que desnacionalizó a los judíos residentes en el extranjero. Confirmar la privación efectiva.`
        : `Restitución por persecución nazi: Art. 116(2) GG (restauración de quienes fueron privados de la nacionalidad entre 1933 y 1945) o §15 StAG (restitución, en vigor 20.8.2021, para quienes la perdieron de otro modo o no pudieron adquirirla por la persecución). Sin examen de idioma/residencia, admite doble nacionalidad y se extiende a descendientes. Documentos: prueba de la nacionalidad alemana previa y evidencia de persecución (Reichsanzeiger 1941, expedientes de Wiedergutmachung, Arolsen Archives, Yad Vashem).`});
  }
  // ----- VIA D: residencia -----
  if(A.facts.lives==="si"){
    vias.push({k:"D", name:T("Naturalización por residencia (§10)","Naturalization by residence (§10)"), state:"DUDOSO",
      msg:T("Si vives en Alemania, podrías naturalizarte tras 5 años cumpliendo idioma, sustento y test. Se evalúa aparte.","If you live in Germany, you may naturalize after 5 years meeting language, livelihood and test. Assessed separately."), gaps:[],
      legal:`Naturalización por residencia §10 StAG (reforma StARModG, 27.6.2024): 5 años de residencia legal, idioma B1, Einbürgerungstest, sustento propio, sin condenas y compromiso con la Ley Fundamental; doble nacionalidad ya admitida. (La vía exprés de 3 años fue derogada el 8.10.2025.) Verificar permiso de residencia y empadronamiento.`});
  }
  const order={VIABLE:0,DUDOSO:1,INFO:2,POCO:3};
  vias.sort((x,y)=>order[x.state]-order[y.state]);

  // ----- Lista de "qué averiguar" (todas las incógnitas / "no sé") -----
  const inv=[]; const G2=germanAncestor();
  if(!germanAncestorReached()) inv.push(T("Confirmar quién es tu antepasado alemán, en qué año y lugar nació, si emigró y en qué año lo hizo.","Confirm who your German ancestor is, the year and place they were born, whether they emigrated and in what year."));
  [A.applicant,...A.chain].forEach(p=>{ if(p.name && !parseInt(p.birthYear)) inv.push(T(`Conseguir el año de nacimiento de ${p.name}.`,`Find ${p.name}'s birth year.`)); });
  if(G2){
    if(["pre1904","1904_1913","ns"].includes(A.facts.emigYear) && (A.facts.matrikel==="ns"||!A.facts.matrikel)) inv.push(T(`Verificar en el archivo invenio si ${G2.name} tuvo inscripción consular (Matrikel).`,`Check the invenio archive for ${G2.name}'s consular registration (Matrikel).`));
    if(A.facts.emigYear==="ns") inv.push(T(`Averiguar el año en que ${G2.name} emigró de Alemania.`,`Find the year ${G2.name} emigrated from Germany.`));
    if(A.facts.natz1914==="ns") inv.push(T(`Confirmar si ${G2.name} se naturalizó en otro país antes de 1914.`,`Confirm whether ${G2.name} naturalized abroad before 1914.`));
  }
  if(A.facts.persecution==="ns") inv.push(T("Averiguar si tus antepasados sufrieron persecución nazi (1933–1945).","Find out whether your ancestors suffered Nazi persecution (1933–1945)."));
  if(A.facts.natz25==="ns") inv.push(T("Confirmar si tú o un antepasado se naturalizaron en otro país por solicitud propia.","Confirm whether you or an ancestor naturalized abroad by application."));
  if(A.facts.natz25==="si_apeticion" && !natzLoss && (A.facts.natz25_eu==="ns"||A.facts.natz25_year==="ns"||A.facts.natz25_permit==="ns"))
    inv.push(T("Confirmar si esa naturalización causó la pérdida de la nacionalidad alemana: si el país es de la UE/Suiza, el año exacto, y si hubo permiso de conservación.","Confirm whether that naturalization caused loss of German citizenship: whether the country is EU/Switzerland, the exact year, and whether there was a retention permit."));
  if(A.facts.adoption==="si") inv.push(T("Revisar con un especialista si la adopción en tu línea transmite la nacionalidad (edad del adoptado, nacionalidad del adoptante, fecha).","Have a specialist review whether the adoption in your line transmits citizenship (adoptee's age, adopter's nationality, date)."));
  if(A.facts.mil28==="si") inv.push(T("Revisar con un especialista si el servicio militar voluntario en un ejército extranjero causó pérdida de la nacionalidad (§28).","Have a specialist check whether voluntary service in a foreign army caused loss of citizenship (§28)."));
  if(A.facts.namechange==="si") inv.push(T("Reunir documentos que justifiquen los cambios de apellido / ortografía / identidad (deben acreditar que es la misma persona).","Gather documents justifying surname / spelling / identity changes (they must prove it's the same person)."));
  if(A.facts.relative==="si") inv.push(T("Un familiar ya obtuvo la nacionalidad por el mismo antepasado: pídele su certificado de nacionalidad alemana o el número de expediente. Es un antecedente muy valioso para respaldar tu caso.","A relative already obtained citizenship through the same ancestor: ask them for their German citizenship certificate or case number. It's a very valuable supporting record for your case."));

  return {vias, investigate:inv};
}
function germanAncestorReached(){ return state.chain.some(isGerman); }

function setBar(p){ document.getElementById("bar").style.width=p+"%"; }
function footer(){ document.getElementById("brandName").textContent=T("Nacionalidad Alemana","German Citizenship");
  document.getElementById("discFoot").textContent=T(
   "Esta herramienta ofrece solo una orientación preliminar y no constituye asesoría jurídica ni garantiza la nacionalidad. Consulta siempre con el Bundesverwaltungsamt, un consulado alemán o un abogado especializado.",
   "This tool offers preliminary guidance only; it is not legal advice and does not guarantee citizenship. Always consult the Bundesverwaltungsamt, a German consulate or a specialized lawyer."); }

function chips(label,opts,onPick,selVal){
  return `<div class="step-label">${label}</div>`+opts.map(o=>
    `<button class="opt ${selVal===o[0]?'sel':''}" onclick="${onPick}('${o[0]}')">${T(o[1],o[2])}${o[3]?`<small>${T(o[3],o[4])}</small>`:''}</button>`).join("");
}
function navBtns(nextLabel,canNext){
  return `<div class="nav">
    <button class="btn btn-ghost" onclick="back()" ${hist.length?'':"style='visibility:hidden'"}>${T("Atrás","Back")}</button>
    <button class="btn btn-primary" id="nx" onclick="advance()" ${canNext?'':'disabled'}>${nextLabel}</button></div>`;
}

      <div class="qhint">${T("Por ejemplo, hijo/a de alemanes nacido/a en el extranjero. Si era alemán/a, esta es tu raíz alemana y dejamos de subir.","E.g., a child of Germans born abroad. If they were German, this is your German root and we stop here.")}</div>

        <div class="qhint">${T("La fecha es clave: antes de 1914 hay una regla de pérdida automática, y el período del régimen nazi (1933–1945) puede abrir la vía de restitución.","The date is key: before 1914 there's an automatic-loss rule, and the Nazi-regime period (1933–1945) may open the restitution route.")}</div>
        ${chips("",[["pre1904","Antes de ~1904","Before ~1904"],["1904_1913","Entre 1904 y 1913","1904–1913"],["1914_1932","Entre 1914 y 1932","1914–1932"],["nazi_era","Entre 1933 y 1945 (período del régimen nazi)","1933–1945 (Nazi-regime period)"],["post1945","En 1946 o después","1946 or later"],["no_emig","No emigró","Did not emigrate"],["ns","No sé","Not sure"]],"pickFact",state.facts.emigYear)}`;

        ${chips("",[["si","Sí","Yes"],["no","No","No"],["ns","No sé","Not sure"]],"pickFactPers",state.facts.persecution)}`;

    } else if(f==="f_natz25"){

function genLabel(depth, rel){
  const f = rel==="madre";
  const es=["", f?"Madre":"Padre", f?"Abuela":"Abuelo", f?"Bisabuela":"Bisabuelo", f?"Tatarabuela":"Tatarabuelo"];
  const en=["", f?"Mother":"Father", f?"Grandmother":"Grandfather", f?"Great-grandmother":"Great-grandfather", f?"2×-great-gm":"2×-great-gf"];
  return depth<es.length ? T(es[depth],en[depth]) : T("Ancestro/a","Ancestor");
}
function familyTree(mark){
  if(!state.applicant.name && !state.chain.length) return "";
  const rows=[{p:state.applicant,rel:null},...state.chain.map(x=>({p:x,rel:x.rel}))];
  let h=`<div class="tree2">`;
  rows.forEach((row,idx)=>{
    const p=row.p, isDE=isGerman(p);
    const isMark = mark && p.name && p.name===mark.person;
    const cls = isMark ? (mark.type==="legit"?"warn":"brk") : (isDE?"de":"");
    const gen = idx===0 ? T("Tú","You") : genLabel(idx,row.rel);
    const meta=[p.birthYear,p.country].filter(Boolean).join(" · ");
    let pill="";
    if(isMark){
      const txt = mark.type==="loss"?T("posible pérdida aquí","possible loss here"):(mark.type==="legit"?T("a revisar (legitimación)","review (legitimation)"):T("la línea se corta aquí","line breaks here"));
      pill=`<span class="pill" style="background:${mark.type==="legit"?"var(--amber)":"var(--red)"}">⚠ ${txt}</span>`;
    } else if(isDE){
      pill=`<span class="pill" style="background:var(--green)">🇩🇪 ${T("raíz alemana","German root")}</span>`;
    }
    h+=`<div class="tnode ${cls}"><div class="gen">${gen}</div><div class="body"><div class="nm">${esc(p.name||T("(sin nombre)","(no name)"))}</div>${meta?`<div class="mt">${esc(meta)}</div>`:""}${pill}</div></div>`;
    if(idx<rows.length-1) h+=`<div class="tconn ${isMark&&mark.type!=="legit"?"cut":""}"></div>`;
  });
  h+=`</div>`; return h;
}
function renderTreeSoFar(){ return familyTree(null); }

// Borradores de consulta al Consulado de Alemania (para la asesora), en ES / EN / PT
function buildConsularDrafts(vias){

  const esAlemania = G && /alemania|germany|deutschland/i.test(G.country||"");
  const D={
    es:{abbr:"n.",subject:"Asunto: Consulta sobre posible nacionalidad alemana por ascendencia",greet:"Estimados señores del Consulado de Alemania:",
      intro:(n,c,y)=>`Mi nombre es ${n}, nacido/a en ${c}${y?" en "+y:""}.`,quisiera:"Quisiera consultar",
      q:{B:"si tendría derecho a recuperar la nacionalidad alemana por restitución (Art. 116(2) de la Ley Fundamental o §15 de la Ley de Nacionalidad), dado que mi antepasado fue perseguido por el régimen nazi",C:"si podría adquirir la nacionalidad alemana mediante la declaración del §5 de la Ley de Nacionalidad (corrección de la discriminación histórica en la transmisión)",A:"si podría determinarse mi nacionalidad alemana por descendencia (§4 de la Ley de Nacionalidad) a través de mi antepasado alemán",X:"si tengo algún derecho a la nacionalidad alemana a través de mi línea de ascendencia, y qué requisitos o documentos serían necesarios"},
      lineaH:"Mi línea de ascendencia es la siguiente:",childOf:"  ←  hijo/a de  ",
      anc:(name,y,emig)=>`Mi antepasado alemán, ${name}, ${esAlemania?"nació en Alemania":"era de origen alemán"}${y?" en "+y:""} y ${emig}.`,
      emig:{pre1904:"emigró de Alemania antes de ~1904",1904_1913:"emigró de Alemania entre 1904 y 1913",1914_1932:"emigró de Alemania entre 1914 y 1932",nazi_era:"emigró de Alemania entre 1933 y 1945",post1945:"emigró de Alemania después de 1945",no_emig:"no emigró de Alemania",ns:"emigró de Alemania en una fecha por confirmar"},
      req:"Agradecería que me indicaran si mi caso podría calificar y, en tal caso, cómo iniciar el procedimiento de determinación de la nacionalidad alemana y qué documentos debo presentar.",close:"Quedo atento/a a su respuesta.",gracias:"Muchas gracias."},
    en:{abbr:"b.",subject:"Subject: Inquiry about possible German citizenship by descent",greet:"Dear Sir or Madam at the German Consulate,",
      intro:(n,c,y)=>`My name is ${n}, born in ${c}${y?" in "+y:""}.`,quisiera:"I would like to inquire",
      q:{B:"whether I would be entitled to reclaim German citizenship through restitution (Art. 116(2) of the Basic Law or §15 of the Nationality Act), as my ancestor was persecuted by the Nazi regime",C:"whether I could acquire German citizenship through the declaration under §5 of the Nationality Act (correction of historical discrimination in transmission)",A:"whether my German citizenship could be established by descent (§4 of the Nationality Act) through my German ancestor",X:"whether I have any claim to German citizenship through my line of descent, and what requirements or documents would be needed"},
      lineaH:"My line of descent is as follows:",childOf:"  ←  child of  ",
      anc:(name,y,emig)=>`My German ancestor, ${name}, ${esAlemania?"was born in Germany":"was of German origin"}${y?" in "+y:""} and ${emig}.`,
      emig:{pre1904:"emigrated from Germany before ~1904",1904_1913:"emigrated from Germany between 1904 and 1913",1914_1932:"emigrated from Germany between 1914 and 1932",nazi_era:"emigrated from Germany between 1933 and 1945",post1945:"emigrated from Germany after 1945",no_emig:"did not emigrate from Germany",ns:"emigrated from Germany on a date to be confirmed"},
      req:"I would be grateful if you could let me know whether my case might qualify and, if so, how to begin the procedure to determine my German citizenship and which documents I must submit.",close:"I look forward to your reply.",gracias:"Thank you very much."},
    pt:{abbr:"n.",subject:"Assunto: Consulta sobre possível nacionalidade alemã por ascendência",greet:"Prezados senhores do Consulado da Alemanha,",
      intro:(n,c,y)=>`Meu nome é ${n}, nascido(a) em ${c}${y?" em "+y:""}.`,quisiera:"Gostaria de consultar",
      q:{B:"se eu teria direito a recuperar a nacionalidade alemã por restituição (Art. 116(2) da Lei Fundamental ou §15 da Lei de Nacionalidade), uma vez que meu antepassado foi perseguido pelo regime nazista",C:"se eu poderia adquirir a nacionalidade alemã por meio da declaração do §5 da Lei de Nacionalidade (correção da discriminação histórica na transmissão)",A:"se a minha nacionalidade alemã poderia ser determinada por descendência (§4 da Lei de Nacionalidade) através do meu antepassado alemão",X:"se tenho algum direito à nacionalidade alemã através da minha linha de ascendência, e quais requisitos ou documentos seriam necessários"},
      lineaH:"Minha linha de ascendência é a seguinte:",childOf:"  ←  filho(a) de  ",
      anc:(name,y,emig)=>`Meu antepassado alemão, ${name}, ${esAlemania?"nasceu na Alemanha":"era de origem alemã"}${y?" em "+y:""} e ${emig}.`,
      emig:{pre1904:"emigrou da Alemanha antes de ~1904",1904_1913:"emigrou da Alemanha entre 1904 e 1913",1914_1932:"emigrou da Alemanha entre 1914 e 1932",nazi_era:"emigrou da Alemanha entre 1933 e 1945",post1945:"emigrou da Alemanha depois de 1945",no_emig:"não emigrou da Alemanha",ns:"emigrou da Alemanha em data a confirmar"},
      req:"Agradeceria que me informassem se o meu caso poderia se qualificar e, em tal caso, como iniciar o procedimento de determinação da nacionalidade alemã e quais documentos devo apresentar.",close:"Fico no aguardo de sua resposta.",gracias:"Muito obrigado(a)."}
  };
  function build(L){
    const d=D[L];
    const linea=[ap,...A.chain].map(p=>`${p.name||"(?)"}${p.birthYear?` (${d.abbr} ${p.birthYear}${p.country?", "+p.country:""})`:(p.country?` (${p.country})`:"")}`).join(d.childOf);

function renderResult(){
  const {vias,investigate}=analyze();
  const infoGaps=vias.filter(v=>v.state==="INFO").flatMap(v=>v.gaps||[]);
  const checklist=[...new Set([...investigate,...infoGaps])];

  // Veredicto ÚNICO para el cliente (el detalle por vía queda para la asesora)
  const overall = vias.some(v=>v.state==="VIABLE")?"VIABLE"
    : vias.some(v=>v.state==="DUDOSO")?"DUDOSO"
    : vias.some(v=>v.state==="POCO")?"POCO":"INFO";
  const OV={
    VIABLE:["g","🟢",T("Altamente posible","Highly possible"),T("Según tus respuestas, tu caso tiene buenas bases para obtener la nacionalidad alemana. El siguiente paso es revisarlo en detalle y reunir la documentación.","Based on your answers, your case has solid grounds to obtain German citizenship. The next step is a detailed review and gathering the documents.")],
    DUDOSO:["a","🟡",T("Posible","Possible"),T("Tu caso es posible, pero hay puntos que conviene confirmar con una revisión profesional.","Your case is possible, but some points should be confirmed with a professional review.")],
    POCO:["r","🔴",T("Por ahora no calificas","Not eligible for now"),T("Según la normativa alemana vigente, por ahora tu caso no calificaría para obtener la nacionalidad por las vías que evaluamos.","Under current German law, your case would not qualify for citizenship through the routes we assessed for now.")],
    INFO:["b","🔵",T("Necesitamos más información","More information needed"),T("Para evaluarte mejor necesitamos algunos datos más. Reúne los antecedentes de abajo y podremos orientarte.","To assess you better we need a bit more data. Gather the items below and we'll be able to guide you.")]
  };
  const ov=OV[overall];

  let html=`<h1>${T("Tu evaluación preliminar","Your preliminary assessment")}</h1>`;
  html+=`<div class="res ${ov[0]}" style="text-align:center;padding:20px 18px;margin-bottom:16px">
      <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;opacity:.85">${T("Resultado preliminar","Preliminary result")}</div>
      <div style="font-size:23px;font-weight:800;margin:6px 0">${ov[1]} ${ov[2]}</div>
      <div style="font-size:14.5px">${ov[3]}</div>
    </div>`;
  html+=`<div class="step-label">${T("Tu árbol","Your tree")}</div>`+renderTreeWithBreak(vias);

  if(checklist.length){
    html+=`<div class="step-label" style="margin-top:18px">${T("Para avanzar, conviene reunir","To move forward, gather")}</div>
      <ul class="docs">`+checklist.map(x=>`<li>${esc(x)}</li>`).join("")+`</ul>`;
  }
  if(state.bothNoted) html+=`<div class="res b" style="margin-top:8px"><span class="badge">${T("Otra rama","Other branch")}</span><p>${T("Indicaste raíces alemanas por ambos lados. Aquí evaluamos una; puedes repetir el test para la otra.","You indicated German roots on both sides. This evaluated one; you can retake the test for the other.")}</p></div>`;
  const closing = overall==="POCO"
    ? T("Guardamos tu contacto. Si la legislación alemana cambia y tu caso pasa a ser elegible, te avisaremos.","We'll keep your contact. If German law changes and your case becomes eligible, we'll let you know.")
    : T("Te contactaremos con un análisis más detallado y los próximos pasos para tu caso.","We'll contact you with a more detailed analysis and the next steps for your case.");
  html+=`<p class="lead" style="margin-top:16px">${closing}</p>`;
  html+=`<p class="savednote" id="saved"></p>`;
  document.getElementById("app").innerHTML=html; pushLead("completo", vias, checklist);
}
function renderTreeWithBreak(vias){
  // El cliente ve su árbol SIN el punto de quiebre (la raíz alemana sí se marca).
  // El quiebre/pérdida queda solo para la asesora (panel y email).
  return familyTree(null);
}

function pickFactMar(v){ state.facts.marriageloss=v; render(); }
function pickFactMil(v){ state.facts.mil28=v; render(); }
function pickFactNc(v){ state.facts.namechange=v; render(); }
function pickFactRel(v){ state.facts.relative=v; render(); }
function pickFact5(v){ state.facts.lives=v; render(); }

function advance(){
  const s=state.screen;
  if(s==="intro"){ go("applicant"); return; }
  if(s==="applicant"){ if(!state.applicant.name) return; go("contact"); return; }
  if(s==="build_person"){
    if(!(state.draft.name&&state.draft.childInWedlock)) return;
    snapshot();
    state.chain.push({rel:state.draft.rel,name:state.draft.name,birthYear:state.draft.birthYear,country:state.draft.country,childInWedlock:state.draft.childInWedlock,marriageYear:state.draft.marriageYear||""});
    const reachedDE = state.draft.country && state.draft.country.toLowerCase().match(/alemania|germany|deutschland/);
    state.draft={};
    if(reachedDE){ buildFactsQueue(); state.screen="facts"; } else { state.screen="build_citizen"; }
    render(); return;
  }
  if(s==="facts"){ const f=curFact();
    const okMap={f_emig:"emigYear",f_matrikel:"matrikel",f_natz1914:"natz1914",f_persecution:"persecution",f_natz25:"natz25",f_natz25_eu:"natz25_eu",f_natz25_year:"natz25_year",f_natz25_permit:"natz25_permit",f_natz25_when:"natz25_when",f_adoption:"adoption",f_adoption_age:"adoption_age",f_marriageloss:"marriageloss",f_mil28:"mil28",f_namechange:"namechange",f_relative:"relative",f_lives:"lives"};
    if(okMap[f] && !state.facts[okMap[f]]) return; nextFact(); return;
  }
  if(s==="contact"){ if(!((state.contact.email||state.contact.phone)&&state.contact.consent)) return; savePartial(); go("build_rel"); return; }
  if(s==="result"){ return; }
}

function setLang(l){ LANG=l; document.documentElement.lang=l;
  document.getElementById("es").classList.toggle("on",l==="es");
  document.getElementById("en").classList.toggle("on",l==="en"); render(); }

function mountCaptcha(tries){
  tries=tries||0;
  if(!CONFIG.TURNSTILE_SITEKEY) return;
  const el=document.getElementById("cf"); if(!el || el.dataset.rendered) return;
  if(!window.turnstile){ if(tries<30) setTimeout(function(){ mountCaptcha(tries+1); },200); return; }
  el.dataset.rendered="1";
  try{ turnstile.render(el,{sitekey:CONFIG.TURNSTILE_SITEKEY,
    callback:function(t){ state.contact.turnstileToken=t; chk(); },
    "expired-callback":function(){ state.contact.turnstileToken=""; chk(); },
    "error-callback":function(){ state.contact.turnstileToken=""; chk(); }}); }catch(e){}
}
function cfReady(){ if(state && state.screen==="contact") mountCaptcha(); }
if(typeof window!=="undefined") window.cfReady=cfReady;

function phoneDigits(p){ return (p||"").replace(/\D/g,""); }
function cleanPhone(p){ return (p||"").replace(/[^\d+]/g,""); }
function contactOk(){ const c=state.contact;
  return !!((c.email || phoneDigits(c.phone).length>=8) && c.consent && (!CONFIG.TURNSTILE_SITEKEY || c.turnstileToken)); }

/* ---------------- persistencia ---------------- */
async function pushLead(status, vias, checklist){
  const created=new Date().toISOString();
  const answers={applicant:state.applicant, chain:state.chain, facts:state.facts, investigate:checklist||[], consent:state.contact.consent===true, consent_at:created};
  if(status==="completo") answers.consular_draft=buildConsularDrafts(vias||[]);
  const verdict=(vias||[]).map(v=>({via:v.k,name:v.name,state:v.state,msg:v.msg,mark:v.mark||null,legal:v.legal||null}));
  const body={session_id:state.sessionId, status, lang:LANG,
    name:state.contact.name||state.applicant.name||null, email:state.contact.email||null,
    phone:(phoneDigits(state.contact.phone).length>=8 ? cleanPhone(state.contact.phone) : null),
    answers, verdict};
  const note=document.getElementById("saved");
  const ok=()=>{ if(note) note.textContent=T("✓ Registro guardado","✓ Submission saved"); };
  // 1) vía servidor (verifica captcha e inserta con clave de servidor)
  try{
    const r=await fetch("/api/lead",{method:"POST", keepalive:true, headers:{"Content-Type":"application/json"},
      body:JSON.stringify(Object.assign({}, body, {token:state.contact.turnstileToken||null, pass:state.sessionPass||null}))});
    if(r.ok){ const d=await r.json().catch(()=>({})); if(status==="parcial" && d.pass) state.sessionPass=d.pass; ok(); return; }
  }catch(e){}
  // 2) fallback: inserción directa (transición, mientras se termina de configurar el servidor)
  if(CONFIG.SUPABASE_URL && CONFIG.SUPABASE_ANON_KEY){
    try{ const r=await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/leads`,{method:"POST", keepalive:true,
        headers:{"Content-Type":"application/json","apikey":CONFIG.SUPABASE_ANON_KEY,"Authorization":`Bearer ${CONFIG.SUPABASE_ANON_KEY}`,"Prefer":"return=minimal"},
        body:JSON.stringify(body)});
      if(note) note.textContent=r.ok?T("✓ Registro guardado","✓ Submission saved"):T("No se pudo guardar.","Could not save."); return; }
    catch(e){}
  }
  // 3) demo local
  const all=JSON.parse(localStorage.getItem("leads")||"[]"); all.push(body); localStorage.setItem("leads",JSON.stringify(all));
  if(note) note.textContent=T("Modo demo: guardado en este navegador.","Demo mode: saved in this browser.");
}
function savePartial(){ if(state.partialSaved) return; state.partialSaved=true; pushLead("parcial", [], []); }

render();
</script>
